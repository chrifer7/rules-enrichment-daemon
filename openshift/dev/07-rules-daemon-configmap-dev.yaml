apiVersion: v1
kind: ConfigMap
metadata:
  name: rules-enrichment-daemon-dev-config
  labels:
    app.kubernetes.io/name: rules-enrichment-daemon
    app.kubernetes.io/environment: dev
data:
  APP_NAME: rules-enrichment-daemon
  APP_ENV: dev
  APP_VERSION: 0.1.0
  LOG_LEVEL: INFO
  LOG_ECS_ENABLED: "true"
  LOG_TO_STDOUT: "true"
  LOG_TO_FILE: "false"
  USE_SQLITE: "false"
  EXTERNAL_API_BASE_URL: http://manhattan-simulator-
  EXTERNAL_API_TIMEOUT_SECONDS: "8"
  POLL_INTERVAL_SECONDS: "10"
  POLL_BATCH_SIZE: "25"
  RULE_CACHE_TTL_SECONDS: "30"
  MAX_PROCESSING_ATTEMPTS: "3"
  OUTBOX_PUBLISH_INTERVAL_SECONDS: "5"
  OUTBOX_SINK_MODE: log
