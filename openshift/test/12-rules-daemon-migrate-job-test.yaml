apiVersion: batch/v1
kind: Job
metadata:
  name: rules-daemon-migrate-test
  labels:
    app.kubernetes.io/name: rules-daemon-migrate
    app.kubernetes.io/environment: test
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rules-daemon-migrate
        app.kubernetes.io/environment: test
    spec:
      restartPolicy: Never
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: rules-enrichment-daemon-test-is:latest
          imagePullPolicy: IfNotPresent
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: rules-enrichment-daemon-test-config
            - secretRef:
                name: rules-enrichment-daemon-test-secret
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
